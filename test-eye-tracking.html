        <div class="debug">
            <div><strong>Debug Info:</strong></div>
            <div id="left-transform">Left Pupil: transform(0, 0)</div>
            <div id="right-transform">Right Pupil: transform(0, 0)</div>
            <div id="mouse-pos">Mouse: (0, 0)</div>
        </div>
    </div>

    <script>
        const leftPupil = document.getElementById('left-pupil');
        const rightPupil = document.getElementById('right-pupil');
        const leftTransformDebug = document.getElementById('left-transform');
        const rightTransformDebug = document.getElementById('right-transform');
        const mousePosDebug = document.getElementById('mouse-pos');

        document.addEventListener('mousemove', (e) => {
            const leftEye = leftPupil.parentElement;
            const rightEye = rightPupil.parentElement;

            const leftEyeRect = leftEye.getBoundingClientRect();
            const rightEyeRect = rightEye.getBoundingClientRect();

            const leftEyeCenter = {
                x: leftEyeRect.left + leftEyeRect.width / 2,
                y: leftEyeRect.top + leftEyeRect.height / 2,
            };

            const rightEyeCenter = {
                x: rightEyeRect.left + rightEyeRect.width / 2,
                y: rightEyeRect.top + rightEyeRect.height / 2,
            };

            const calculatePupilPosition = (eyeCenter) => {
                const dx = e.clientX - eyeCenter.x;
                const dy = e.clientY - eyeCenter.y;
                const angle = Math.atan2(dy, dx);
                const maxDistance = 10;
                const cursorDistance = Math.sqrt(dx * dx + dy * dy);
                const distance = Math.min(cursorDistance / 15, maxDistance);
                const pupilX = Math.cos(angle) * distance;
                const pupilY = Math.sin(angle) * distance;
                return { x: pupilX, y: pupilY };
            };

            const leftPupilPos = calculatePupilPosition(leftEyeCenter);
            const rightPupilPos = calculatePupilPosition(rightEyeCenter);

            // Apply transform WITHOUT 'px' units (SVG coordinate space)
            leftPupil.style.transform = `translate(${leftPupilPos.x}, ${leftPupilPos.y})`;
            rightPupil.style.transform = `translate(${rightPupilPos.x}, ${rightPupilPos.y})`;

            // Update debug info
            leftTransformDebug.textContent = `Left Pupil: transform(${leftPupilPos.x.toFixed(2)}, ${leftPupilPos.y.toFixed(2)})`;
            rightTransformDebug.textContent = `Right Pupil: transform(${rightPupilPos.x.toFixed(2)}, ${rightPupilPos.y.toFixed(2)})`;
            mousePosDebug.textContent = `Mouse: (${e.clientX}, ${e.clientY})`;
        });
    </script>
